<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Edit Employee</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>Employee ID</label>

                    <input
                        type="text"
                        name="employee_id"
                        class="form-control"
                        value="{{ user.employee_id }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>Full Name</label>

                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        value="{{ user.full_name }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ user.email }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>Role</label>

                    <select name="role" class="form-control">

                        <option value="Employee"
                            {% if user.role=="Employee" %}selected{% endif %}>
                            Employee
                        </option>

                        <option value="Admin"
                            {% if user.role=="Admin" %}selected{% endif %}>
                            Admin
                        </option>

                    </select>

                </div>

                <button class="btn btn-success">
                    Update Employee
                </button>

                <a href="/employees" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
